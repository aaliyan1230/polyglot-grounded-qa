default_language: base
run_name: local-notebook-run
retrieval:
  mode: text
  hybrid_policy: naive
  backend: faiss_bm25
  top_k_dense: 25
  top_k_sparse: 25
  top_k_rerank: 10
  graph_top_k: 6
  fusion: weighted_rrf
  dense_weight: 0.7
  sparse_weight: 0.3
  text_weight: 0.65
  graph_weight: 0.35
  graph_max_hops: 2
  graph_min_path_score: 0.35
  graph_min_quality_score: 0.45
  entity_link_min_score: 0.2
